<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempInbox (Vmail.dev)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6c5ce7;
            --primary-light: #a29bfe;
            --secondary: #00cec9;
            --dark: #2d3436;
            --light: #f5f6fa;
            --gray: #636e72;
            --success: #00b894;
            --warning: #fdcb6e;
            --error: #d63031;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        .container { width: 100%; max-width: 600px; }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 { font-size: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .content { padding: 20px; }
        .email-section, .inbox-section {
            background: var(--light);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
        }
        .email-display {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--dark);
            background: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.1);
            word-break: break-all;
        }
        .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 15px; }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-refresh { background: var(--warning); color: white; }
        .btn-delete { background: var(--error); color: white; }
        .email-list { max-height: 300px; overflow-y: auto; }
        .email-item {
            background: white;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .empty-inbox { text-align: center; padding: 40px 20px; color: var(--gray); }
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: rgba(108,92,231,0.1);
            border-radius: 8px;
            margin-top: 15px;
        }
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%; background: var(--success);
        }
        .status-dot.loading { background: var(--warning); animation: pulse 1.5s infinite; }
        .status-dot.error { background: var(--error); }
        @keyframes pulse { 0%,100% {opacity:1} 50% {opacity:0.5} }
        .error-message, .success-message {
            padding: 10px; border-radius: 6px; margin-top: 10px; text-align: center; font-size: 0.85rem;
        }
        .error-message { background: rgba(214,48,49,0.1); color: var(--error); }
        .success-message { background: rgba(0,184,148,0.1); color: var(--success); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1><i class="fas fa-envelope"></i> TempInbox (Vmail.dev)</h1>
                <p>快速、安全的临时邮箱服务</p>
            </div>
            <div class="content">
                <div class="email-section">
                    <div class="email-display" id="email-address">
                        点击下方按钮生成邮箱
                        <div class="loader" id="email-loader" style="display:none;"></div>
                    </div>
                    <div class="error-message" id="email-error" style="display:none;"></div>
                    <div class="success-message" id="email-success" style="display:none;"></div>
                    <div class="actions">
                        <button class="btn btn-primary" id="generate-btn">
                            <i class="fas fa-plus-circle"></i> 生成邮箱
                        </button>
                        <button class="btn btn-secondary" id="copy-btn">
                            <i class="fas fa-copy"></i> 复制地址
                        </button>
                        <button class="btn btn-refresh" id="refresh-btn">
                            <i class="fas fa-sync-alt"></i> 手动刷新
                        </button>
                        <button class="btn btn-delete" id="clear-storage-btn" style="display:none;">
                            <i class="fas fa-eraser"></i> 清除数据
                        </button>
                    </div>
                </div>

                <div class="inbox-section">
                    <div class="inbox-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
                        <div style="font-size:1.2rem;font-weight:600;">收件箱 
                            <span id="email-count" style="background:#6c5ce7;color:white;padding:2px 10px;border-radius:15px;font-size:0.8rem;">0</span>
                        </div>
                    </div>
                    <div class="email-list" id="email-list">
                        <div class="empty-inbox">
                            <i class="fas fa-inbox" style="font-size:2.5rem;color:#e2e8f0;margin-bottom:10px;"></i>
                            <p>收件箱为空</p>
                            <p>发送邮件到上方地址即可显示</p>
                        </div>
                    </div>
                    <div class="status-bar">
                        <div class="status-dot" id="status-dot"></div>
                        <div class="status-text" id="status-text">准备就绪</div>
                    </div>
                </div>
            </div>
            <div class="footer" style="text-align:center;padding:15px;color:#888;font-size:0.85rem;border-top:1px solid #eee;">
                我的临时邮箱服务 • 邮件由 <a href="https://vmail.dev" target="_blank">Vmail.dev</a> 提供，自动销毁
            </div>
        </div>
    </div>

    <script>
        // ==================== 【必须修改】 ====================
        const API_KEY = 'vmail_0T6OOdjA6VhmYkrKAuTZZZcZEEc36ijB';   // ←←← 这里改成你在 vmail.dev 获取的 API Key

        let currentEmail = '';
        let mailboxId = '';
        let refreshInterval = null;
        let emailCache = [];

        const emailDisplay = document.getElementById('email-address');
        const generateBtn = document.getElementById('generate-btn');
        const copyBtn = document.getElementById('copy-btn');
        const refreshBtn = document.getElementById('refresh-btn');
        const clearBtn = document.getElementById('clear-storage-btn');
        const emailList = document.getElementById('email-list');
        const emailCount = document.getElementById('email-count');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const emailError = document.getElementById('email-error');
        const emailSuccess = document.getElementById('email-success');

        const baseUrl = 'https://vmail.dev/api/v1';

        function updateStatus(msg, type = '') {
            statusText.textContent = msg;
            statusDot.className = 'status-dot';
            if (type === 'loading') statusDot.classList.add('loading');
            if (type === 'error') statusDot.classList.add('error');
        }

        function showError(msg) {
            emailError.textContent = msg;
            emailError.style.display = 'block';
            setTimeout(() => emailError.style.display = 'none', 5000);
        }

        function showSuccess(msg) {
            emailSuccess.textContent = msg;
            emailSuccess.style.display = 'block';
            setTimeout(() => emailSuccess.style.display = 'none', 4000);
        }

        async function generateRandomEmail() {
            if (!API_KEY || API_KEY.includes('你的真实')) {
                showError('请先把代码里的 API_KEY 替换成你在 vmail.dev 获取的真实 Key');
                return;
            }

            updateStatus('正在生成邮箱...', 'loading');
            try {
                const res = await fetch(`${baseUrl}/mailboxes`, {
                    method: 'POST',
                    headers: {
                        'X-API-Key': API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({})
                });

                if (!res.ok) throw new Error('创建邮箱失败 ' + res.status);

                const data = await res.json();
                currentEmail = data.data?.address || data.address;
                mailboxId = data.data?.id || data.id;

                emailDisplay.textContent = currentEmail || '生成失败';
                clearBtn.style.display = 'inline-block';

                showSuccess('邮箱生成成功！');
                updateStatus('准备就绪');
                checkEmails();
                startPolling();
            } catch (err) {
                showError('生成失败：' + err.message);
                updateStatus('生成失败', 'error');
            }
        }

        async function checkEmails() {
            if (!mailboxId) return;
            updateStatus('检查邮件...', 'loading');
            try {
                const res = await fetch(`${baseUrl}/mailboxes/${mailboxId}/messages`, {
                    headers: { 'X-API-Key': API_KEY }
                });
                const result = await res.json();
                emailCache = result.data || [];
                emailCount.textContent = emailCache.length;

                if (emailCache.length === 0) {
                    emailList.innerHTML = `<div class="empty-inbox"><i class="fas fa-inbox" style="font-size:2.5rem;color:#e2e8f0;"></i><p>收件箱为空</p></div>`;
                } else {
                    renderEmailList();
                }
                updateStatus('就绪');
            } catch (e) {
                updateStatus('获取失败', 'error');
            }
        }

        function renderEmailList() {
            emailList.innerHTML = emailCache.map(m => `
                <div class="email-item">
                    <div><i class="fas fa-envelope"></i></div>
                    <div style="flex:1;">
                        <div style="font-weight:600;">${m.from || '未知'}</div>
                        <div style="color:#666;font-size:0.9rem;">${m.subject || '无主题'}</div>
                    </div>
                    <div style="color:#888;font-size:0.8rem;">${m.createdAt ? new Date(m.createdAt).toLocaleTimeString() : ''}</div>
                </div>
            `).join('');
        }

        function startPolling() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(checkEmails, 15000);
        }

        // 按钮事件
        generateBtn.addEventListener('click', generateRandomEmail);
        copyBtn.addEventListener('click', () => {
            if (currentEmail) {
                navigator.clipboard.writeText(currentEmail);
                showSuccess('已复制到剪贴板');
            }
        });
        refreshBtn.addEventListener('click', checkEmails);
        clearBtn.addEventListener('click', () => location.reload());

        // 初始化
        updateStatus('准备就绪');
    </script>
</body>
</html>
