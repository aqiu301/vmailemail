<script>
    // ==================== 请在这里修改 ====================
    const YOUR_API_KEY = 'vmail_0T6OOdjA6VhmYkrKAuTZZZcZEEc36ijB';   // ←←← 必须改成你刚获取的 Key

    let currentEmail = '';
    let mailboxId = '';
    let refreshInterval = null;
    let emailCache = [];
    let currentEmailId = '';

    // DOM 元素
    const emailDisplay = document.getElementById('email-address');
    const accountInfo = document.getElementById('account-info');
    const generateBtn = document.getElementById('generate-btn');
    const copyBtn = document.getElementById('copy-btn');
    const refreshBtn = document.getElementById('refresh-btn');
    const deleteAccountBtn = document.getElementById('delete-account-btn');
    const clearStorageBtn = document.getElementById('clear-storage-btn');
    const emailList = document.getElementById('email-list');
    const emailCount = document.getElementById('email-count');
    const statusText = document.getElementById('status-text');
    const statusDot = document.getElementById('status-dot');
    const emailDetail = document.getElementById('email-detail');
    const closeDetailBtn = document.getElementById('close-detail');
    const emailError = document.getElementById('email-error');
    const emailSuccess = document.getElementById('email-success');
    const emailLoader = document.getElementById('email-loader');

    const baseUrl = 'https://vmail.dev/api/v1';

    async function fetchWithRetry(url, options = {}, retries = 3) {
        for (let i = 0; i < retries; i++) {
            try {
                const res = await fetch(url, options);
                if (res.status === 429) {
                    await new Promise(r => setTimeout(r, 2500));
                    continue;
                }
                return res;
            } catch (e) {
                if (i === retries - 1) throw e;
                await new Promise(r => setTimeout(r, 800));
            }
        }
    }

    function updateStatus(msg, type = 'default') {
        statusText.textContent = msg;
        statusDot.className = 'status-dot';
        if (type === 'loading') statusDot.classList.add('loading');
        else if (type === 'error') statusDot.classList.add('error');
    }

    function showError(msg) {
        emailError.textContent = msg;
        emailError.style.display = 'block';
        setTimeout(() => emailError.style.display = 'none', 5000);
    }

    function showSuccess(msg) {
        emailSuccess.textContent = msg;
        emailSuccess.style.display = 'block';
        setTimeout(() => emailSuccess.style.display = 'none', 4000);
    }

    function showLoader(show) {
        emailDisplay.classList.toggle('loading', show);
        updateStatus(show ? '正在生成邮箱...' : '准备就绪', show ? 'loading' : 'default');
    }

    // 生成邮箱（Vmail.dev）
    async function generateRandomEmail() {
        if (!YOUR_API_KEY || YOUR_API_KEY.includes('YOUR_')) {
            showError('请先在代码中替换成你的真实 Vmail API Key！');
            return;
        }

        showLoader(true);
        try {
            const res = await fetchWithRetry(`${baseUrl}/mailboxes`, {
                method: 'POST',
                headers: {
                    'X-API-Key': YOUR_API_KEY,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({})   // 可选：{"localPart": "myname"} 自定义前缀
            });

            if (!res.ok) {
                const errText = await res.text();
                throw new Error(`创建失败 (${res.status}): ${errText}`);
            }

            const data = await res.json();
            currentEmail = data.data?.address || data.address || '';
            mailboxId = data.data?.id || data.id || '';

            if (!currentEmail) throw new Error('服务器未返回邮箱地址');

            emailDisplay.textContent = currentEmail;
            deleteAccountBtn.style.display = 'block';
            clearStorageBtn.style.display = 'block';

            showSuccess('邮箱生成成功！现在可以接收邮件了');
            checkEmails();   // 立即检查一次
            startPolling();
        } catch (err) {
            console.error(err);
            showError('生成失败：' + err.message);
        } finally {
            showLoader(false);
        }
    }

    async function checkEmails() {
        if (!mailboxId || !YOUR_API_KEY) return;
        updateStatus('检查邮件中...', 'loading');
        try {
            const res = await fetchWithRetry(`${baseUrl}/mailboxes/${mailboxId}/messages`, {
                headers: { 'X-API-Key': YOUR_API_KEY }
            });

            if (!res.ok) throw new Error('获取邮件列表失败');

            const result = await res.json();
            emailCache = result.data || result.messages || [];
            emailCount.textContent = emailCache.length;

            if (emailCache.length > 0) {
                renderEmailList(emailCache);
                updateStatus(`收到 ${emailCache.length} 封邮件`, 'success');
            } else {
                showEmptyInbox();
                updateStatus('收件箱为空', 'success');
            }
        } catch (err) {
            updateStatus('获取失败', 'error');
            console.error(err);
        }
    }

    function startPolling() {
        if (refreshInterval) clearInterval(refreshInterval);
        refreshInterval = setInterval(checkEmails, 12000);   // 每12秒自动刷新
    }

    function showEmptyInbox() {
        emailList.innerHTML = `
            <div class="empty-inbox">
                <i class="fas fa-inbox"></i>
                <p>收件箱为空</p>
                <p>发送邮件到上方地址即可在这里看到</p>
            </div>
        `;
    }

    function renderEmailList(emails) {
        // 简单实现，根据你的原 CSS 结构，你可以继续完善
        emailList.innerHTML = emails.map(email => `
            <div class="email-item" data-id="${email.id || email.messageId}">
                <div class="email-icon"><i class="fas fa-envelope"></i></div>
                <div class="email-content">
                    <div class="email-sender">${email.from || '未知发件人'}</div>
                    <div class="email-subject">${email.subject || '无主题'}</div>
                </div>
                <div class="email-time">${formatTime(email.createdAt || email.date)}</div>
            </div>
        `).join('');

        // 点击查看详情（可后续完善）
        document.querySelectorAll('.email-item').forEach(item => {
            item.addEventListener('click', () => {
                const id = item.getAttribute('data-id');
                alert('查看邮件详情功能待完善\n邮件ID: ' + id);   // 临时提示
            });
        });
    }

    function formatTime(timeStr) {
        if (!timeStr) return '刚刚';
        const date = new Date(timeStr);
        const diff = Math.floor((Date.now() - date) / 1000);
        if (diff < 60) return '刚刚';
        if (diff < 3600) return Math.floor(diff/60) + '分钟前';
        return Math.floor(diff/3600) + '小时前';
    }

    // 复制按钮
    copyBtn.addEventListener('click', () => {
        if (!currentEmail) return showError('还没有邮箱地址');
        navigator.clipboard.writeText(currentEmail).then(() => {
            showSuccess('邮箱地址已复制');
        });
    });

    // 其他按钮绑定
    generateBtn.addEventListener('click', generateRandomEmail);
    refreshBtn.addEventListener('click', checkEmails);
    clearStorageBtn.addEventListener('click', () => {
        if (confirm('确定清除当前邮箱数据吗？')) location.reload();
    });

    // 初始化
    emailDisplay.textContent = '点击下方按钮生成邮箱';
    showEmptyInbox();
</script>
